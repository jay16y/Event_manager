<!-- accounts/templates/accounts/forgot_password.html -->
{% extends 'base.html' %}

{% block title %}Forgot Password - EventHub{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-5 offset-md-3">
        <div class="card">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">🔑 Forgot Password</h2>
                <p class="text-center text-muted-custom mb-4">
                    Enter your registered email address. We'll send you a 6-digit OTP to reset your password.
                </p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            name="email" 
                            class="form-control" 
                            placeholder="Enter your registered email"
                            required
                        >
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            📧 Send OTP
                        </button>
                    </div>
                </form>
                
                <hr>
                
                <p class="text-center">
                    Remember your password? 
                    <a href="{% url 'login' %}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
